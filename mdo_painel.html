        const { data, error } = await supabase.from(table).select('*');
        if (error) { console.error(`Erro ao ler ${table}:`, error); return []; }
        return data || [];
      },
      // Inserir dados
      async insert(table, rows) {
        const { data, error } = await supabase.from(table).insert(rows).select();
        if (error) { console.error(`Erro ao inserir em ${table}:`, error); return null; }
        return data;
      },
      // Upsert (insert or update)
      async upsert(table, rows, onConflict) {
        const { data, error } = await supabase.from(table).upsert(rows, { onConflict }).select();
        if (error) { console.error(`Erro ao upsert em ${table}:`, error); return null; }
        return data;
      },
      // Deletar tudo de uma tabela (para reimportar)
      async clearTable(table) {
        const { error } = await supabase.from(table).delete().neq('id', 0);
        if (error) console.error(`Erro ao limpar ${table}:`, error);
      },
      // Registrar importação

            db.getAll('vendas_periodo'),
            db.getAll('custos'),
            db.getAll('importacoes')
          ]);

            setDbData({ clientes, produtos, vendasEstado, vendasCanal, vendasPeriodo, custos, importacoes });

            setDbStatus('vazio');
          }

        }
        setLoading(false);
      }, []);

      if (!data || data.length < 2) return null;
      const max = Math.max(...data);
      const min = Math.min(...data);
      const range = max - min || 1;
      const points = data.map((v, i) => {
        const x = (i / (data.length - 1)) * width;
        const y = height - ((v - min) / range) * (height - 4) - 2;
        return `${x},${y}`;
      }).join(' ');
      return (
        <svg width={width} height={height} className="inline-block ml-2">
          <polyline fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" points={points} />
        </svg>

        {

    // Parser de arquivos
    const parseFile = (file) => {
      return new Promise((resolve, reject) => {
        const ext = file.name.split('.').pop().toLowerCase();

        if (ext === 'csv' || ext === 'tsv' || ext === 'txt') {
          Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            encoding: 'UTF-8',
            complete: (results) => {
              resolve({ colunas: results.meta.fields || [], dados: results.data, erros: results.errors.length });
            },
            error: (err) => reject(err)
          });
        } else if (ext === 'xlsx' || ext === 'xls') {
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
              const ws = wb.Sheets[wb.SheetNames[0]];
              // Parse raw (sem headers) para controlar melhor
              const jsonRaw = XLSX.utils.sheet_to_json(ws, { defval: '', header: 1 });
              if (!jsonRaw || jsonRaw.length === 0) {
                resolve({ colunas: [], dados: [], erros: 0, abas: wb.SheetNames });
                return;
              }

              // Detectar onde estão os headers reais
              // Bling coloca "Meu Negócio - Bling" na linha 1, headers na linha 2
              let headerRowIdx = 0;
              for (let i = 0; i < Math.min(jsonRaw.length, 5); i++) {
                const row = jsonRaw[i];
                if (!row || row.length === 0) continue;
                const firstCell = String(row[0] || '').toLowerCase().trim();
                const filledCells = row.filter(v => v != null && String(v).trim() !== '').length;

                // Se a linha tem apenas 1 célula preenchida e parece título, pular
                if (filledCells <= 1 && (
                  firstCell.includes('meu neg') || firstCell.includes('bling') ||
                  firstCell.includes('relat') || firstCell.includes('meu negocio')
                )) {
                  headerRowIdx = i + 1;
                  continue;
                }

                // Se a linha tem múltiplas células texto (não números), é provavelmente o header
                const textCells = row.filter(v => {
                  const s = String(v || '').trim();
                  return s && isNaN(s.replace(/[R$%\s.,]/g, ''));
                });
                if (textCells.length >= 2 && filledCells >= 2) {
                  headerRowIdx = i;
                  break;
                }
              }

              const headers = jsonRaw[headerRowIdx].map((h, idx) => {
                const s = h != null ? String(h).trim() : '';
                return s || `Coluna_${idx + 1}`;
              });
              const dataRows = jsonRaw.slice(headerRowIdx + 1)
                .filter(row => row && row.some(v => v != null && String(v).trim() !== ''))
                .map(row => {
                  const obj = {};
                  headers.forEach((h, idx) => { obj[h] = row[idx] != null ? row[idx] : ''; });
                  return obj;
                });

              let colunas = headers;
              let json = dataRows;

              resolve({ colunas, dados: json, erros: 0, abas: wb.SheetNames, linhasTituloPuladas });
            } catch (err) { reject(err); }
          };
          reader.readAsArrayBuffer(file);
        } else {
          reject(new Error(`Formato .${ext} não suportado. Use CSV, TSV, XLS ou XLSX.`));
        }
      });
    };

    const ImportarSection = ({ onDataApplied }) => {
      const [arquivos, setArquivos] = useState([]);

      const [dragOver, setDragOver] = useState(false);
      const [selectedArquivo, setSelectedArquivo] = useState(null);

      const processarArquivo = async (file) => {
        setProcessando(true);
        try {
          const { colunas, dados, erros, abas } = await parseFile(file);
          const tipoDetectado = DETECTAR_TIPO_ARQUIVO(colunas, dados.slice(0, 5), file.name);

          const resultado = {
            id: Date.now() + Math.random(),
            nomeArquivo: file.name,
            tamanho: (file.size / 1024).toFixed(1) + ' KB',
            formato: file.name.split('.').pop().toUpperCase(),
            totalLinhas: dados.length,
            totalColunas: colunas.length,
            colunas,
            dados: dados,
            amostra: dados.slice(0, 8),
            erros,
            abas,
            tipoDetectado,
            dataImportacao: new Date().toLocaleString('pt-BR'),
            status: tipoDetectado.confianca >= 50 ? 'identificado' : 'revisar',
            aplicado: false
          };

          setArquivos(prev => [...prev, resultado]);
          setSelectedArquivo(resultado.id);
        } catch (err) {
          alert('Erro ao processar arquivo: ' + err.message);
        }
        setProcessando(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        const files = Array.from(e.dataTransfer.files);
        files.forEach(f => processarArquivo(f));

      const aplicarDados = async (arqId) => {

        try {
          const tipo = arq.tipoDetectado?.tipo;
          const dados = arq.amostra.length < arq.totalLinhas ? arq.dados || arq.amostra : arq.amostra;
          const allData = arq.dados || arq.amostra;
          const mapa = arq.tipoDetectado?.mapeamento || {};

          const parseMoney = (v) => {
            if (v == null) return 0;
            const s = String(v).replace(/R\$|\s|\xa0/g, '').replace(/\./g, '').replace(',', '.').trim();
            const n = parseFloat(s);
            return isNaN(n) ? 0 : n;
          };
          const parsePercent = (v) => {
            if (v == null) return 0;
            const s = String(v).replace('%', '').replace(',', '.').trim();
            const n = parseFloat(s);
            return isNaN(n) ? 0 : n;
          };

          if (tipo === 'bling_clientes') {
            const rows = allData.map(r => ({
              nome: r[mapa.nome] || r['Nome'] || '',

              total_pedidos: parseInt(r[mapa.produtos] || r['Produtos'] || 0),
              total_gasto: parseMoney(r[mapa.valor] || r['Valor']),
              markup: parsePercent(r[mapa.markup] || r['Markup']),
              lucro: parseMoney(r[mapa.lucro] || r['Lucro Venda']),
              celular: r[mapa.telefone] || r['Celular'] || null,
              tipo: 'B2C',
              fonte: 'bling_import'
            })).filter(r => r.nome && r.nome !== 'Totais' && r.nome !== 'Total');
            if (rows.length > 0) {
              await db.insert('clientes', rows);
            }
          } else if (tipo === 'bling_vendas_estado') {
            const rows = allData.map(r => ({
              periodo: 'IMPORTADO',
              uf: r[mapa.estado] || r['Estado'] || '',
              pedidos: parseInt(r[mapa.pedidos] || r['Pedidos'] || 0),
              receita: parseMoney(r[mapa.valor] || r['Valor']),
              pecas: parseInt(r[mapa.pecas] || r['Pecas'] || 0),
              frete_medio: parseMoney(r[mapa.freteMedio] || r['Frete Médio'] || r['Frete Medio']),
              ticket_medio: parseMoney(r[mapa.ticketMedio] || r['Ticket Médio'] || r['Ticket Medio']),
              fonte: 'bling_import'
            })).filter(r => r.uf && r.uf !== 'Total' && r.uf !== 'Totais');
            if (rows.length > 0) {
              await db.insert('vendas_estado', rows);
            }
          } else if (tipo === 'bling_vendas_loja') {
            const rows = allData.map(r => ({
              periodo: 'IMPORTADO',
              canal: r[mapa.loja] || r['Loja'] || '',
              pedidos: parseInt(r[mapa.pedidos] || r['Pedidos'] || 0),
              receita: parseMoney(r[mapa.valor] || r['Valor']),
              ticket_medio: parseMoney(r[mapa.ticketMedio] || r['Ticket Médio'] || r['Ticket Medio']),
              markup: parsePercent(r[mapa.markup] || r['Markup']),
              contribuicao: parseMoney(r[mapa.contribuicao] || r['$ Contribuição'] || r['$ Contribuicao']),
              fonte: 'bling_import'
            })).filter(r => r.canal && r.canal !== 'Total' && r.canal !== 'Totais');
            if (rows.length > 0) {
              await db.insert('vendas_canal', rows);
            }
          } else if (tipo === 'bling_produtos' || tipo === 'bling_curva_abc' || tipo === 'bling_estoque') {
            const rows = allData.map(r => ({
              sku: String(r[mapa.sku] || r['Codigo'] || r['Código'] || '').trim(),
              nome: r[mapa.nome] || r['Descricao'] || r['Descrição'] || '',
              quantidade_vendida: parseInt(r[mapa.quantidade] || r['Quantidade'] || 0),
              receita: parseMoney(r[mapa.valor] || r['Valor']),
              markup: parsePercent(r[mapa.markup] || r['Markup']),
              custo: parseMoney(r[mapa.custo] || r['Custo']),
              preco_venda: parseMoney(r[mapa.valor] || r['Valor']),
              estoque: parseInt(r[mapa.estoque] || r['Estoque'] || 0),
              fat_percentual: parsePercent(r[mapa.faturamento] || r['% Faturamento']),
              fonte: 'bling_import'
            })).filter(r => r.sku && r.nome && r.nome !== 'Total');
            if (rows.length > 0) {
              await db.upsert('produtos', rows, 'sku');
            }
          } else if (tipo === 'bling_financeiro') {
            const rows = allData.map(r => ({
              periodo: 'IMPORTADO',
              categoria: r[mapa.categoria] || 'Outros',
              item: r[mapa.descricao] || r['Descricao'] || r['Descrição'] || '',
              valor: parseMoney(r[mapa.valor] || r['Valor']),
              tipo: 'variavel',
              fonte: 'bling_import'
            })).filter(r => r.item && r.item !== 'Total');
            if (rows.length > 0) {
              await db.insert('custos', rows);
            }
          }

          // Log da importação
          await db.logImport(arq.nomeArquivo, arq.tipoDetectado?.label || 'desconhecido', arq.totalLinhas, arq.totalColunas, arq.tipoDetectado?.confianca || 0);

          setArquivos(prev => prev.map(a => a.id === arqId ? { ...a, aplicado: true, status: 'aplicado' } : a));
          setHistorico(prev => [...prev, { data: new Date().toLocaleString('pt-BR'), arquivo: arq.nomeArquivo, tipo: arq.tipoDetectado?.label, linhas: arq.totalLinhas }]);
          // Recarregar dados do Supabase em todas as seções
          if (onDataApplied) onDataApplied();
        } catch (err) {
          console.error('Erro ao aplicar dados:', err);
          alert('Erro ao salvar no Supabase: ' + err.message);
        }
        setProcessando(false);
      };

      const removerArquivo = (arqId) => {
        setArquivos(prev => prev.filter(a => a.id !== arqId));
        if (selectedArquivo === arqId) setSelectedArquivo(null);
      };

      const arqSelecionado = arquivos.find(a => a.id === selectedArquivo);

      return (
        <div className="space-y-6">
          {/* Header */}
          <div>
            <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100">Importar Dados</h2>
            <p className="text-sm text-gray-500 dark:text-gray-400">Arraste arquivos do Bling, Shopify, RD Station ou extratos bancários. A IA identifica automaticamente o tipo.</p>
          </div>

          {/* Formatos suportados */}
          <div className="flex flex-wrap gap-2">
            {[
              { icon: '🧾', label: 'Bling (Clientes, Vendas, Produtos, NFs, Financeiro)' },
              { icon: '🛍️', label: 'Shopify (Clientes, Pedidos)' },
              { icon: '📇', label: 'RD Station (Contatos, Negociações)' },
              { icon: '🏦', label: 'Extratos Bancários (CEF/Outros)' }
            ].map((f, i) => (
              <span key={i} className="px-3 py-1.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs text-gray-600 dark:text-gray-400">
                {f.icon} {f.label}
              </span>
            ))}
          </div>

          {/* Zona de Upload */}
          <div
            onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={handleDrop}
            className={`relative border-2 border-dashed rounded-2xl p-10 text-center transition-all ${
              dragOver
                ? 'border-green-500 bg-green-50 dark:bg-green-950 scale-[1.02]'
                : 'border-gray-300 dark:border-gray-600 hover:border-green-400 hover:bg-gray-50 dark:hover:bg-gray-800'
            }`}
          >
            <input type="file" multiple accept=".csv,.tsv,.txt,.xlsx,.xls" onChange={handleFileInput} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
            <div className="space-y-3">
              <div className="text-5xl">{processando ? '⏳' : dragOver ? '📂' : '📥'}</div>
              <div>
                <p className="text-lg font-medium text-gray-700 dark:text-gray-300">
                  {processando ? 'Processando...' : dragOver ? 'Solte os arquivos aqui' : 'Arraste arquivos ou clique para selecionar'}
                </p>
                <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">CSV, TSV, XLS, XLSX &bull; Múltiplos arquivos simultaneamente</p>
              </div>
            </div>
          </div>

          {/* Arquivos importados */}
          {arquivos.length > 0 && (
            <div className="space-y-4">
              <h3 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Arquivos Importados ({arquivos.length})</h3>

              <div className="grid md:grid-cols-3 gap-3">
                {arquivos.map(arq => (
                  <div
                    key={arq.id}
                    onClick={() => setSelectedArquivo(arq.id)}
                    className={`bg-white dark:bg-gray-800 rounded-xl border p-4 cursor-pointer transition hover:shadow-md ${
                      selectedArquivo === arq.id ? 'border-green-500 ring-2 ring-green-200 dark:ring-green-800' : 'border-gray-200 dark:border-gray-700'
                    }`}
                  >
                    <div className="flex items-start justify-between mb-2">
                      <div className="flex items-center gap-2">
                        <span className="text-xl">{arq.tipoDetectado?.icon || '📄'}</span>
                        <div>
                          <p className="text-sm font-medium text-gray-800 dark:text-gray-200 truncate max-w-[180px]">{arq.nomeArquivo}</p>
                          <p className="text-[10px] text-gray-400">{arq.tamanho} &bull; {arq.formato}</p>
                        </div>
                      </div>
                      <button onClick={(e) => { e.stopPropagation(); removerArquivo(arq.id); }} className="text-gray-400 hover:text-red-500 text-xs">&times;</button>
                    </div>

                    {/* Tipo detectado */}
                    <div className={`p-2 rounded-lg mb-2 ${
                      arq.status === 'aplicado' ? 'bg-green-50 dark:bg-green-950 border border-green-200 dark:border-green-800' :
                      arq.tipoDetectado?.confianca >= 70 ? 'bg-blue-50 dark:bg-blue-950 border border-blue-200 dark:border-blue-800' :
                      arq.tipoDetectado?.confianca >= 40 ? 'bg-yellow-50 dark:bg-yellow-950 border border-yellow-200 dark:border-yellow-800' :
                      'bg-red-50 dark:bg-red-950 border border-red-200 dark:border-red-800'
                    }`}>
                      <div className="flex justify-between items-center">
                        <p className="text-xs font-medium">{arq.status === 'aplicado' ? 'Dados aplicados' : arq.tipoDetectado?.label}</p>
                        <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full ${
                          arq.status === 'aplicado' ? 'bg-green-200 text-green-800' :
                          arq.tipoDetectado?.confianca >= 70 ? 'bg-blue-200 text-blue-800' :
                          arq.tipoDetectado?.confianca >= 40 ? 'bg-yellow-200 text-yellow-800' :
                          'bg-red-200 text-red-800'
                        }`}>{arq.status === 'aplicado' ? '✓ OK' : `${arq.tipoDetectado?.confianca || 0}%`}</span>
                      </div>
                      <p className="text-[10px] text-gray-500 dark:text-gray-400 mt-0.5">→ {arq.tipoDetectado?.destino}</p>
                    </div>

                    <div className="flex justify-between text-xs text-gray-500 dark:text-gray-400">
                      <span>{formatNumber(arq.totalLinhas)} linhas</span>
                      <span>{arq.totalColunas} colunas</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Detalhe do arquivo selecionado */}
          {arqSelecionado && (
            <div className="animate-slide-up">
              <SectionCard>
                <div className="flex items-center justify-between mb-4">
                  <div className="flex items-center gap-3">
                    <span className="text-3xl">{arqSelecionado.tipoDetectado?.icon}</span>
                    <div>
                      <h3 className="font-bold text-gray-800 dark:text-gray-100">{arqSelecionado.nomeArquivo}</h3>
                      <p className="text-sm text-gray-500 dark:text-gray-400">
                        {arqSelecionado.tipoDetectado?.label} &bull; {formatNumber(arqSelecionado.totalLinhas)} registros &bull; Importado {arqSelecionado.dataImportacao}
                      </p>
                    </div>
                  </div>
                  {!arqSelecionado.aplicado && (
                    <button onClick={() => aplicarDados(arqSelecionado.id)}
                      className="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 transition">
                      Aplicar Dados ao Painel
                    </button>
                  )}
                  {arqSelecionado.aplicado && (
                    <span className="px-4 py-2 bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300 rounded-lg text-sm font-medium">Dados Aplicados</span>
                  )}
                </div>

                {/* Detecção IA */}
                <div className="mb-4 p-4 bg-indigo-50 dark:bg-indigo-950 rounded-xl border border-indigo-200 dark:border-indigo-800">
                  <div className="flex items-start gap-3">
                    <span className="text-xl">🤖</span>
                    <div className="flex-1">
                      <p className="text-sm font-semibold text-indigo-800 dark:text-indigo-300">Análise Automática</p>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-2">
                        <div>
                          <p className="text-[10px] text-indigo-500 dark:text-indigo-400 uppercase">Tipo Detectado</p>
                          <p className="text-sm font-medium text-indigo-800 dark:text-indigo-300">{arqSelecionado.tipoDetectado?.label}</p>
                        </div>
                        <div>
                          <p className="text-[10px] text-indigo-500 dark:text-indigo-400 uppercase">Confiança</p>
                          <div className="flex items-center gap-1">
                            <div className="flex-1 h-2 bg-indigo-200 dark:bg-indigo-800 rounded-full overflow-hidden">
                              <div className="h-full bg-indigo-500 rounded-full" style={{ width: `${arqSelecionado.tipoDetectado?.confianca || 0}%` }} />
                            </div>
                            <span className="text-sm font-bold text-indigo-700 dark:text-indigo-300">{arqSelecionado.tipoDetectado?.confianca || 0}%</span>
                          </div>
                        </div>
                        <div>
                          <p className="text-[10px] text-indigo-500 dark:text-indigo-400 uppercase">Destino</p>
                          <p className="text-sm font-medium text-indigo-800 dark:text-indigo-300">{arqSelecionado.tipoDetectado?.destino}</p>
                        </div>
                        <div>
                          <p className="text-[10px] text-indigo-500 dark:text-indigo-400 uppercase">Registros</p>
                          <p className="text-sm font-medium text-indigo-800 dark:text-indigo-300">{formatNumber(arqSelecionado.totalLinhas)} linhas</p>
                        </div>
                      </div>

                      {/* Campos mapeados */}
                      {arqSelecionado.tipoDetectado?.mapeamento && Object.keys(arqSelecionado.tipoDetectado.mapeamento).length > 0 && (
                        <div className="mt-3 pt-3 border-t border-indigo-200 dark:border-indigo-800">
                          <p className="text-[10px] text-indigo-500 dark:text-indigo-400 uppercase mb-1">Campos Mapeados</p>
                          <div className="flex flex-wrap gap-1">
                            {Object.entries(arqSelecionado.tipoDetectado.mapeamento).map(([campo, coluna]) => (
                              <span key={campo} className="px-2 py-0.5 bg-indigo-100 dark:bg-indigo-900 text-indigo-700 dark:text-indigo-300 rounded text-[11px]">
                                {campo}: <strong>{coluna}</strong>
                              </span>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>

                {/* Colunas detectadas */}
                <div className="mb-4">
                  <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-2">Colunas do Arquivo ({arqSelecionado.totalColunas})</p>
                  <div className="flex flex-wrap gap-1">
                    {arqSelecionado.colunas.map((col, i) => {
                      const isMapped = arqSelecionado.tipoDetectado?.mapeamento && Object.values(arqSelecionado.tipoDetectado.mapeamento).includes(col);
                      return (
                        <span key={i} className={`px-2 py-0.5 rounded text-xs ${
                          isMapped ? 'bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300 border border-green-200 dark:border-green-800' :
                          'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400'
                        }`}>
                          {col} {isMapped && '✓'}
                        </span>
                      );
                    })}
                  </div>
                </div>

                {/* Preview dos dados */}
                <div>
                  <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-2">Preview (primeiras {Math.min(arqSelecionado.amostra.length, 8)} linhas)</p>
                  <div className="overflow-x-auto border border-gray-200 dark:border-gray-700 rounded-lg">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="bg-gray-50 dark:bg-gray-750">
                          <th className="px-2 py-1.5 text-left text-[10px] font-medium text-gray-500 dark:text-gray-400">#</th>
                          {arqSelecionado.colunas.slice(0, 10).map((col, i) => (
                            <th key={i} className="px-2 py-1.5 text-left text-[10px] font-medium text-gray-500 dark:text-gray-400 max-w-[120px] truncate">{col}</th>
                          ))}
                          {arqSelecionado.colunas.length > 10 && (
                            <th className="px-2 py-1.5 text-left text-[10px] text-gray-400">+{arqSelecionado.colunas.length - 10}</th>
                          )}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100 dark:divide-gray-700">
                        {arqSelecionado.amostra.map((row, i) => (
                          <tr key={i} className="hover:bg-gray-50 dark:hover:bg-gray-750">
                            <td className="px-2 py-1.5 text-gray-400 font-mono">{i + 1}</td>
                            {arqSelecionado.colunas.slice(0, 10).map((col, j) => (
                              <td key={j} className="px-2 py-1.5 text-gray-700 dark:text-gray-300 max-w-[120px] truncate">{row[col] != null ? String(row[col]) : ''}</td>
                            ))}
                            {arqSelecionado.colunas.length > 10 && <td className="px-2 py-1.5 text-gray-400">...</td>}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                {arqSelecionado.erros > 0 && (
                  <div className="mt-3 p-2 bg-yellow-50 dark:bg-yellow-950 rounded-lg border border-yellow-200 dark:border-yellow-800">
                    <p className="text-xs text-yellow-700 dark:text-yellow-400">{arqSelecionado.erros} linha(s) com erro de parsing foram ignoradas.</p>
                  </div>
                )}
              </SectionCard>
            </div>
          )}

          {/* Histórico de importações */}
          {historico.length > 0 && (
            <SectionCard title="Histórico de Importações">
              <div className="space-y-2">
                {historico.map((h, i) => (
                  <div key={i} className="flex items-center justify-between py-2 border-b border-gray-100 dark:border-gray-700 last:border-0">
                    <div className="flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full bg-green-500" />
                      <span className="text-sm text-gray-800 dark:text-gray-200">{h.arquivo}</span>
                    </div>
                    <div className="flex items-center gap-3 text-xs text-gray-500 dark:text-gray-400">
                      <span>{h.tipo}</span>
                      <span>{formatNumber(h.linhas)} registros</span>
                      <span>{h.data}</span>
                    </div>
                  </div>
                ))}
              </div>
            </SectionCard>
          )}

          {/* Dicas */}
          <SectionCard title="Como importar seus dados">
            <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-4">
              {[
                { icon: '🧾', titulo: 'Bling', passos: ['Acesse Relatórios no menu', 'Selecione o tipo (Clientes, Vendas, etc.)', 'Configure o período desejado', 'Clique em Exportar CSV ou Excel'] },
                { icon: '🛍️', titulo: 'Shopify', passos: ['Vá em Configurações → Exportar', 'Selecione Clientes ou Pedidos', 'Escolha o formato CSV', 'Baixe e arraste o arquivo aqui'] },
                { icon: '📇', titulo: 'RD Station', passos: ['Acesse a base de Leads', 'Filtre os contatos desejados', 'Clique em Exportar', 'Selecione CSV e baixe'] },
                { icon: '🏦', titulo: 'Extrato CEF', passos: ['Acesse o Internet Banking', 'Vá em Extrato → Período', 'Selecione o período desejado', 'Exporte em CSV ou XLS'] }
              ].map((item, i) => (
                <div key={i} className="bg-gray-50 dark:bg-gray-750 rounded-lg p-3">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-xl">{item.icon}</span>
                    <h4 className="font-medium text-gray-800 dark:text-gray-200 text-sm">{item.titulo}</h4>
                  </div>
                  <div className="space-y-1">
                    {item.passos.map((p, j) => (
                      <div key={j} className="flex items-start gap-2">
                        <span className="w-4 h-4 rounded-full bg-gray-300 dark:bg-gray-600 text-[10px] text-white flex items-center justify-center flex-shrink-0 mt-0.5">{j + 1}</span>
                        <p className="text-xs text-gray-600 dark:text-gray-400">{p}</p>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </SectionCard>
        </div>
      );
    };

    // ==========================================
    // SEÇÃO: ALERTAS E PRODUTOS (mantidas)
    // ==========================================
    const AlertasSection = () => {
      const renderGroup = (tipo, icon, cls) => {
        const items = DADOS.alertas.filter(a => a.tipo === tipo);
        if (!items.length) return null;
        return (
          <div className="space-y-3">
            {items.map((a, i) => (
              <div key={i} className={`${cls} rounded-xl p-4`}>
                <div className="flex items-start gap-3">
                  <span className="text-xl">{icon}</span>
                  <div className="flex-1">
                    <div className="flex justify-between items-start">
                      <h3 className="font-semibold">{a.titulo}</h3>
                      <Badge type={tipo}>{tipo.charAt(0).toUpperCase() + tipo.slice(1)}</Badge>
                    </div>
                    <p className="text-sm mt-1">{a.desc}</p>
                    <p className="text-sm mt-2 font-medium">→ {a.acao}</p>
                  </div>
                </div>
              </div>
            ))}
          </div>
        );
      };

      return (
        <div className="space-y-6">
          <h2 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Alertas e Diagnósticos</h2>
          {renderGroup('critico', '🔴', 'bg-red-50 dark:bg-red-950 border border-red-200 dark:border-red-800 text-red-800 dark:text-red-300')}
          {renderGroup('alto', '🟠', 'bg-orange-50 dark:bg-orange-950 border border-orange-200 dark:border-orange-800 text-orange-800 dark:text-orange-300')}
          {renderGroup('medio', '🟡', 'bg-yellow-50 dark:bg-yellow-950 border border-yellow-200 dark:border-yellow-800 text-yellow-800 dark:text-yellow-300')}
          {renderGroup('positivo', '🟢', 'bg-green-50 dark:bg-green-950 border border-green-200 dark:border-green-800 text-green-800 dark:text-green-300')}

          <div className="bg-blue-50 dark:bg-blue-950 border border-blue-200 dark:border-blue-800 rounded-xl p-4">
            <h3 className="font-semibold text-blue-800 dark:text-blue-300 mb-3">Plano de Ação Prioritário</h3>
            <div className="space-y-2">
              {[
                { num: 1, acao: "Renegociar contrato Webi (success fee)", impacto: "Economia R$ 5-6K/mês" },
                { num: 2, acao: "Refinanciar dívidas (SIEMP + Cartão)", impacto: "Reduzir R$ 8K → R$ 3K/mês" },
                { num: 3, acao: "Campanha reativação base 7.500", impacto: "Recuperar 10% inativos = R$ 50K receita" },
                { num: 4, acao: "Prospecção 10 farmácias B2B", impacto: "Adicionar R$ 25K/mês" }
              ].map((item, i) => (
                <div key={i} className="flex items-center gap-3 bg-white dark:bg-gray-800 rounded-lg p-3">
                  <span className="w-6 h-6 rounded-full bg-blue-500 text-white text-sm flex items-center justify-center font-medium flex-shrink-0">{item.num}</span>
                  <div className="flex-1">
                    <p className="text-sm text-gray-800 dark:text-gray-200">{item.acao}</p>
                    <p className="text-xs text-blue-600 dark:text-blue-400">{item.impacto}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const ProdutosSection = () => {
      return (
        <div className="space-y-6">
          <div>
            <h2 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Top 20 Produtos — Curva ABC (Classe A)</h2>
            <SectionCard>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="border-b border-gray-200 dark:border-gray-700">
                      <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400">#</th>
                      <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400">SKU</th>
                      <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400">Produto</th>
                      <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400">Categoria</th>
                      <th className="px-3 py-2 text-right text-xs font-medium text-gray-500 dark:text-gray-400">Qtd</th>
                      <th className="px-3 py-2 text-right text-xs font-medium text-gray-500 dark:text-gray-400">Receita</th>
                      <th className="px-3 py-2 text-right text-xs font-medium text-gray-500 dark:text-gray-400">Markup</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100 dark:divide-gray-700">
                    {DADOS.topProdutos.map((p, i) => (
                      <tr key={i} className="hover:bg-gray-50 dark:hover:bg-gray-750">
                        <td className="px-3 py-2 text-gray-400 font-mono text-sm">{i + 1}</td>
                        <td className="px-3 py-2 font-mono text-sm text-gray-600 dark:text-gray-400">{p.sku}</td>
                        <td className="px-3 py-2 text-gray-800 dark:text-gray-200 text-sm">{p.nome}</td>
                        <td className="px-3 py-2 text-xs"><span className="px-2 py-0.5 rounded bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300">{p.categoria}</span></td>
                        <td className="px-3 py-2 text-right text-gray-600 dark:text-gray-400">{p.qtd}</td>
                        <td className="px-3 py-2 text-right font-medium text-green-600 dark:text-green-400">{formatCurrency(p.receita)}</td>
                        <td className="px-3 py-2 text-right">
                          <span className={`px-2 py-0.5 rounded text-xs font-medium ${p.markup >= 90 ? 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300' : 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300'}`}>{p.markup}%</span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </SectionCard>
          </div>

          {/* Categorias */}
          {/* Categorias - dados reais */}
          <div>
            <h2 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Categorias de Venda (391 SKUs vendidos)</h2>
            <SectionCard>
              <div className="grid md:grid-cols-2 gap-6">
                <div>
                  {DADOS.categorias.map((cat, i) => (
                    <ProgressBar key={cat.nome} label={`${cat.nome} (${cat.produtos} SKUs)`} value={cat.receita} max={DADOS.categorias[0].receita} color={i === 0 ? 'green' : i === 1 ? 'blue' : i === 2 ? 'purple' : 'orange'} detail={`${formatCurrency(cat.receita)} (${cat.percentual}%)`} showPercent={false} />
                  ))}
                </div>
                <div className="flex items-center justify-center">
                  <PieChart data={DADOS.categorias.slice(0, 7).map(c => ({ canal: c.nome, percent: c.percentual }))} size={130} />
                </div>
              </div>
            </SectionCard>
          </div>

          {/* Curva ABC */}
          <div>
            <h2 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Curva ABC — Distribuição de Produtos</h2>
            <SectionCard>
              <div className="grid grid-cols-3 gap-4 text-center mb-4">
                <div className="p-3 bg-green-50 dark:bg-green-950 rounded-xl border border-green-200 dark:border-green-800">
                  <p className="text-2xl font-bold text-green-700 dark:text-green-300">{DADOS.curvaABC.classeA}</p>
                  <p className="text-xs text-green-600 dark:text-green-400">Classe A (80% receita)</p>
                  <p className="text-[10px] text-green-500">Top sellers</p>
                </div>
                <div className="p-3 bg-blue-50 dark:bg-blue-950 rounded-xl border border-blue-200 dark:border-blue-800">
                  <p className="text-2xl font-bold text-blue-700 dark:text-blue-300">{DADOS.curvaABC.classeB}</p>
                  <p className="text-xs text-blue-600 dark:text-blue-400">Classe B (15% receita)</p>
                  <p className="text-[10px] text-blue-500">Intermediários</p>
                </div>
                <div className="p-3 bg-orange-50 dark:bg-orange-950 rounded-xl border border-orange-200 dark:border-orange-800">
                  <p className="text-2xl font-bold text-orange-700 dark:text-orange-300">{DADOS.curvaABC.classeC}</p>
                  <p className="text-xs text-orange-600 dark:text-orange-400">Classe C (5% receita)</p>
                  <p className="text-[10px] text-orange-500">Cauda longa</p>
                </div>
              </div>
              <ProgressBar label="Classe A — 132 produtos geram 80% da receita" value={80} max={100} color="green" detail="80%" showPercent={false} />
              <ProgressBar label="Classe B — 98 produtos geram 15% da receita" value={15} max={100} color="blue" detail="15%" showPercent={false} />
              <ProgressBar label="Classe C — 78 produtos geram 5% da receita" value={5} max={100} color="orange" detail="5%" showPercent={false} />
            </SectionCard>
          </div>

          {/* Estoque */}
          <div>
            <h2 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Gestão de Estoque</h2>
            <SectionCard>
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                <KPICard label="SKUs no catálogo" value={formatNumber(DADOS.estoque.totalSKUs)} subvalue="total cadastrado" color="blue" />
                <KPICard label="Com estoque" value={formatNumber(DADOS.estoque.comEstoque)} subvalue={`${(DADOS.estoque.comEstoque/DADOS.estoque.totalSKUs*100).toFixed(0)}% do catálogo`} color="green" />
                <KPICard label="Valor em estoque (custo)" value={formatCurrency(DADOS.estoque.valorCusto)} subvalue="capital imobilizado" color="orange" />
                <KPICard label="Valor em estoque (venda)" value={formatCurrency(DADOS.estoque.valorVenda)} subvalue={`margem ~${DADOS.estoque.margemImplicita}%`} color="green" />
              </div>
              <div className="mt-4">
                <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-2">Top 5 por valor em estoque</p>
                {DADOS.estoque.topPorValor.map((p, i) => (
                  <ProgressBar key={p.sku} label={`${p.nome} (${p.estoque} un.)`} value={p.totalValor} max={DADOS.estoque.topPorValor[0].totalValor} color={i === 0 ? 'green' : 'blue'} detail={formatCurrency(p.totalValor)} showPercent={false} />
                ))}
              </div>
              <div className="mt-4 p-3 bg-yellow-50 dark:bg-yellow-950 rounded-lg border border-yellow-200 dark:border-yellow-800">
                <p className="text-sm font-medium text-yellow-800 dark:text-yellow-300">Alerta: {formatNumber(DADOS.estoque.semEstoque)} SKUs sem estoque</p>
                <p className="text-xs text-yellow-700 dark:text-yellow-400 mt-1">75% do catálogo está zerado. Avaliar quais são itens descontinuados vs. ruptura de estoque para limpar catálogo.</p>
              </div>
            </SectionCard>
          </div>

          {/* Regiões */}
          <div>
            <h2 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Vendas por Estado (Mar/26 — {DADOS.regioes.length} estados)</h2>
            <SectionCard>
              <div className="grid md:grid-cols-2 gap-6">
                <div>
                  {DADOS.regioes.map((r, i) => (
                    <ProgressBar key={r.uf} label={`${r.uf} (${r.pecas} pçs)`} value={r.receita} max={DADOS.regioes[0].receita} color={i === 0 ? 'green' : i < 3 ? 'blue' : 'orange'} detail={`${r.pedidos} ped. &bull; ${formatCurrency(r.receita)}`} showPercent={false} />
                  ))}
                </div>
                <div className="flex flex-col items-center justify-center gap-4">
                  <PieChart data={DADOS.regioes.slice(0, 6).map(r => ({ canal: r.uf, percent: r.percent }))} size={130} labelKey="canal" />
                  <div className="text-center p-3 bg-green-50 dark:bg-green-950 rounded-lg border border-green-200 dark:border-green-800">
                    <p className="text-xs text-green-700 dark:text-green-400">Expansão geográfica: <strong>{DADOS.evolucaoRegional.periodo1.estados}→{DADOS.evolucaoRegional.periodo2.estados}→{DADOS.evolucaoRegional.periodo3.estados} estados</strong> (Jan→Fev→Mar)</p>
                  </div>
                </div>
              </div>
            </SectionCard>
          </div>
        </div>
      );
    };

    // ==========================================
    // APP PRINCIPAL
    // ==========================================
    const PASSWORD = 'MdO2024@estrategia';

    const App = () => {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [activeSection, setActiveSection] = useState('dashboard');
      const [darkMode, setDarkMode] = useState(false);
      const { dbData, loading, dbStatus, recarregar } = useSupabaseData();

      // Mesclar dados do Supabase com dados hardcoded (Supabase tem prioridade)
      const dadosAtivos = useMemo(() => {
        if (!dbData) return { fonte: 'local', clientes: CLIENTES_RFM, ...DADOS };

        // Clientes: usar do Supabase se tiver, senão hardcoded
        const clientesDB = dbData.clientes.length > 0 ? dbData.clientes.map((c, i) => ({
          id: c.id,
          nome: c.nome,
          tipo: c.tipo || 'B2C',
          uf: c.uf,
          ultimaCompra: c.ultima_compra,
          diasDesdeUltima: c.ultima_compra ? Math.floor((new Date() - new Date(c.ultima_compra)) / 86400000) : 999,
          totalPedidos: c.total_pedidos || 0,
          frequenciaMensal: c.frequencia_mensal || 0,
          totalGasto: parseFloat(c.total_gasto) || 0,
          ticketMedio: parseFloat(c.ticket_medio) || 0,
          markup: parseFloat(c.markup) || 0,
          lucro: parseFloat(c.lucro) || 0,
          celular: c.celular,
          loja: c.loja || 'Shopify',
          segmento: c.segmento,
          acaoCliente: c.acao_sugerida,
          ultimosProdutos: c.ultimos_produtos || [],
          periodoCliente: c.periodo_cliente || '',
        })) : CLIENTES_RFM;

        // Produtos: usar do Supabase se tiver
        const produtosDB = dbData.produtos.length > 0 ? dbData.produtos.map(p => ({
          sku: p.sku,
          nome: p.nome,
          categoria: p.categoria || 'Outros',
          qtd: p.quantidade_vendida || 0,
          receita: parseFloat(p.receita) || 0,
          markup: parseFloat(p.markup) || 0,
          fatPercent: parseFloat(p.fat_percentual) || 0,
          estoque: p.estoque || 0,
        })).sort((a, b) => b.receita - a.receita) : null;

        // Vendas por estado
        const estadosDB = dbData.vendasEstado.length > 0 ? dbData.vendasEstado.map(e => ({
          uf: e.uf,
          pedidos: e.pedidos || 0,
          receita: parseFloat(e.receita) || 0,
          pecas: e.pecas || 0,
          freteMedio: parseFloat(e.frete_medio) || 0,
          percent: parseFloat(e.percentual) || 0,
        })).sort((a, b) => b.receita - a.receita) : null;

        // Vendas por canal
        const canaisDB = dbData.vendasCanal.length > 0 ? dbData.vendasCanal.map(c => ({
          canal: c.canal,
          pedidos: c.pedidos || 0,
          receita: parseFloat(c.receita) || 0,
          ticket: parseFloat(c.ticket_medio) || 0,
          percent: parseFloat(c.percentual) || 0,
          markup: parseFloat(c.markup) || 0,
        })).sort((a, b) => b.receita - a.receita) : null;

        return {
          fonte: 'supabase',
          clientes: clientesDB,
          topProdutos: produtosDB || DADOS.topProdutos,
          regioes: estadosDB || DADOS.regioes,
          canaisAtuais: canaisDB || DADOS.canais.atuais,
          totalImportacoes: dbData.importacoes.length,
          ultimaImportacao: dbData.importacoes.length > 0 ? dbData.importacoes.sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0] : null,
        };
      }, [dbData]);

      useEffect(() => {
        document.documentElement.classList.toggle('dark', darkMode);
        document.body.className = darkMode ? 'bg-gray-900 transition-colors duration-300' : 'bg-gray-50 transition-colors duration-300';
      }, [darkMode]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (password === PASSWORD) {
          setIsAuthenticated(true);
          setError('');
        } else {
          setError('Senha incorreta');
        }
      };

      const sections = [
        { id: 'dashboard', label: 'Dashboard', icon: '📊' },
        { id: 'fluxo', label: 'Fluxo de Caixa', icon: '💰' },
        { id: 'clientes', label: 'Clientes', icon: '👥' },
        { id: 'b2c', label: 'Análise B2C', icon: '🛒' },
        { id: 'rfm', label: 'Matriz RFM', icon: '🧩' },
        { id: 'b2b', label: 'Canais B2B', icon: '🏢' },
        { id: 'produtos', label: 'Produtos', icon: '📦' },
        { id: 'metas', label: 'Metas 90d', icon: '🎯' },
        { id: 'alertas', label: 'Alertas', icon: '⚠️' }
      ];

      // Loading screen
      if (loading && isAuthenticated) {
        return (
          <div className={`min-h-screen flex items-center justify-center ${darkMode ? 'bg-gray-900' : 'bg-gray-50'}`}>
            <div className="text-center animate-pulse-slow">
              <div className="w-16 h-16 rounded-full bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center text-white text-xl font-bold mx-auto mb-4 shadow-lg">MdO</div>
              <p className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Carregando dados do Supabase...</p>
            </div>
          </div>
        );
      }

      if (!isAuthenticated) {
        return (
          <div className={`min-h-screen flex items-center justify-center p-4 ${darkMode ? 'bg-gray-900' : 'bg-gradient-to-br from-green-50 to-orange-50'}`}>
            <div className={`rounded-2xl shadow-xl p-8 w-full max-w-md ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
              <div className="flex items-center justify-center mb-6">
                <div className="w-16 h-16 rounded-full bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center text-white text-xl font-bold shadow-lg">MdO</div>
              </div>
              <h1 className={`text-2xl font-semibold text-center mb-2 ${darkMode ? 'text-gray-100' : 'text-gray-800'}`}>Mundo dos Óleos</h1>
              <p className={`text-center mb-6 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Painel Estratégico de Consultoria v3</p>
              <form onSubmit={handleLogin}>
                <div className="mb-4">
                  <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Senha de acesso</label>
                  <input type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                    className={`w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-100' : 'border-gray-300'}`}
                    placeholder="Digite a senha" autoFocus />
                </div>
                {error && <p className="text-red-500 text-sm mb-4">{error}</p>}
                <button type="submit" className="w-full bg-green-600 text-white py-3 rounded-lg font-medium hover:bg-green-700 transition shadow-md">Entrar</button>
              </form>
              <div className="flex justify-between items-center mt-6">
                <p className={`text-xs ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>Consultoria 90 dias &bull; Mar/2026</p>
                <button onClick={() => setDarkMode(!darkMode)} className={`text-xs px-3 py-1 rounded-full ${darkMode ? 'bg-gray-700 text-gray-300' : 'bg-gray-100 text-gray-600'}`}>
                  {darkMode ? '☀️ Claro' : '🌙 Escuro'}
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className={`min-h-screen ${darkMode ? 'bg-gray-900' : 'bg-gray-50'}`}>
          {/* Header */}
          <header className={`sticky top-0 z-50 border-b ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
            <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center text-white text-sm font-bold shadow">MdO</div>
                <div>
                  <h1 className={`font-semibold ${darkMode ? 'text-gray-100' : 'text-gray-800'}`}>Mundo dos Óleos</h1>
                  <p className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Painel Estratégico &bull; {DADOS.fluxoCaixa.periodoAtual}</p>
                </div>
              </div>
              <div className="flex items-center gap-2 no-print">
                <span className={`px-3 py-1 rounded-full text-xs font-medium ${DADOS.dre.resultado < 0 ? 'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300' : 'bg-green-100 text-green-700'}`}>
                  {DADOS.dre.resultado < 0 ? 'Déficit' : 'Lucro'}: {formatCurrency(DADOS.dre.resultado)}
                </span>
                <button onClick={() => setDarkMode(!darkMode)} className={`w-8 h-8 rounded-full flex items-center justify-center transition ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-100 hover:bg-gray-200'}`}>
                  {darkMode ? '☀️' : '🌙'}
                </button>
                <button onClick={() => window.print()} className={`w-8 h-8 rounded-full flex items-center justify-center transition ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-100 hover:bg-gray-200'}`} title="Exportar / Imprimir">
                  🖨️
                </button>
                <button onClick={recarregar} className={`w-8 h-8 rounded-full flex items-center justify-center transition ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-100 hover:bg-gray-200'}`} title="Recarregar dados do Supabase">
                  🔄
                </button>
                <span className={`px-2 py-1 rounded-full text-[10px] font-medium ${
                  dbStatus === 'conectado' ? 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300' :
                  dbStatus === 'vazio' ? 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-300' :
                  dbStatus === 'conectando' ? 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300' :
                  'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300'
                }`} title={`Fonte: ${dadosAtivos.fonte}`}>
                  {dbStatus === 'conectado' ? '🟢 DB' : dbStatus === 'vazio' ? '🟡 Local' : dbStatus === 'conectando' ? '🔵 ...' : '🔴 Offline'}
                </span>
              </div>
            </div>
            <div className="max-w-7xl mx-auto px-4 pb-3 no-print">
              <div className="flex gap-1 overflow-x-auto scrollbar-hide">
                {sections.map(s => (
                  <button key={s.id} onClick={() => setActiveSection(s.id)}
                    className={`px-3 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap ${
                      activeSection === s.id
                        ? 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300'
                        : `${darkMode ? 'text-gray-400 hover:bg-gray-700' : 'text-gray-600 hover:bg-gray-100'}`
                    }`}
                  >
                    {s.icon} {s.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          {/* Main */}
          <main className="max-w-7xl mx-auto px-4 py-6">
            {activeSection === 'dashboard' && <DashboardSection onDataApplied={recarregar} />}
            {activeSection === 'fluxo' && <FluxoCaixaSection />}
            {activeSection === 'clientes' && <AnaliseClientesSection />}
            {activeSection === 'b2c' && <AnaliseB2CSection />}
            {activeSection === 'rfm' && <MatrizRFMSection />}
            {activeSection === 'b2b' && <CanaisB2BSection />}
            {activeSection === 'produtos' && <ProdutosSection />}
            {activeSection === 'metas' && <MetasSection />}
            {activeSection === 'alertas' && <AlertasSection />}
          </main>

          {/* Footer */}
          <footer className={`border-t py-4 mt-8 ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
            <div className={`max-w-7xl mx-auto px-4 text-center text-xs ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
              Consultoria Estratégica 90 dias &bull; v3.0 &bull; Dados: 21/03/2026 &bull; {DADOS.empresa.nomeFantasia}
            </div>
          </footer>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
