    const formatCurrency = (value) => {
      if (value == null || isNaN(value)) return 'R$ 0,00';
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
    };

    const formatPercent = (value) => {
      if (value == null || isNaN(value)) return '0,0%';
      const prefix = value > 0 ? '+' : '';
      return `${prefix}${value.toFixed(1)}%`;
    };

    // Sparkline mini-gráfico SVG
    const Sparkline = ({ data, color = "#22c55e", width = 80, height = 24 }) => {
      if (!data || data.length < 2) return null;
      const max = Math.max(...data);
      const min = Math.min(...data);
      const range = max - min || 1;
      const points = data.map((v, i) => {
        const x = (i / (data.length - 1)) * width;
        const y = height - ((v - min) / range) * (height - 4) - 2;
        return `${x},${y}`;
      }).join(' ');
      return (
        <svg width={width} height={height} className="inline-block ml-2">
          <polyline fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" points={points} />
        </svg>
      );
    };

    // KPI Card com sparkline
    const KPICard = ({ label, value, subvalue, trend, color = "gray", sparkData, sparkColor, onClick }) => {
      const colors = {
        green: "bg-green-50 border-green-200 dark:bg-green-950 dark:border-green-800",
        red: "bg-red-50 border-red-200 dark:bg-red-950 dark:border-red-800",
        orange: "bg-orange-50 border-orange-200 dark:bg-orange-950 dark:border-orange-800",
        blue: "bg-blue-50 border-blue-200 dark:bg-blue-950 dark:border-blue-800",
        gray: "bg-white border-gray-200 dark:bg-gray-800 dark:border-gray-700"
      };
      const trendColors = {
        up: "text-green-600 dark:text-green-400",
        down: "text-red-600 dark:text-red-400",
        neutral: "text-gray-500 dark:text-gray-400"
      };
      return (
        <div
          className={`rounded-xl p-4 border ${colors[color] || colors.gray} ${onClick ? 'cursor-pointer hover:shadow-md transition' : ''} animate-fade-in`}
          onClick={onClick}
        >
          <p className="text-sm text-gray-500 dark:text-gray-400">{label}</p>
          <div className="flex items-end justify-between mt-1">
            <p className="text-2xl font-bold text-gray-800 dark:text-gray-100">{value}</p>
            {sparkData && <Sparkline data={sparkData} color={sparkColor || (trend === 'down' ? '#ef4444' : '#22c55e')} />}
          </div>
          {subvalue && (
            <p className={`text-sm mt-1 ${trendColors[trend] || 'text-gray-500 dark:text-gray-400'}`}>
              {subvalue}
            </p>
          )}
        </div>
      );
    };

        alto: "bg-orange-100 text-orange-700 border-orange-200 dark:bg-orange-900 dark:text-orange-300 dark:border-orange-700",
        medio: "bg-yellow-100 text-yellow-700 border-yellow-200 dark:bg-yellow-900 dark:text-yellow-300 dark:border-yellow-700",
        baixo: "bg-gray-100 text-gray-600 border-gray-200 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600",
        positivo: "bg-green-100 text-green-700 border-green-200 dark:bg-green-900 dark:text-green-300 dark:border-green-700"

        </span>
      );

    // Barra de Progresso
    const ProgressBar = ({ value, max, color = "green", label, detail, showPercent = true }) => {
      const percent = Math.min((value / (max || 1)) * 100, 100);
      const colors = {
        green: "bg-green-500",
        red: "bg-red-500",
        orange: "bg-orange-500",
        blue: "bg-blue-500",
        purple: "bg-purple-500"
      };
      return (
        <div className="mb-3">
          <div className="flex justify-between text-sm mb-1">
            <span className="text-gray-600 dark:text-gray-400">{label}</span>
            <span className="text-gray-500 dark:text-gray-400">
              {detail || (showPercent ? `${percent.toFixed(0)}%` : '')}
            </span>
          </div>
          <div className="h-2.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
            <div
              className={`h-full ${colors[color] || colors.green} transition-all duration-700 rounded-full`}
              style={{ width: `${percent}%` }}
            />
          </div>
        </div>
      );
    };

    // Gráfico de Pizza (CSS conic-gradient)
    const PieChart = ({ data, size = 140, valueKey = "percent", labelKey = "canal" }) => {
      let cumulative = 0;
      const colors = ['#22c55e', '#3b82f6', '#f97316', '#eab308', '#8b5cf6', '#ec4899', '#14b8a6', '#f43f5e'];
      const segments = data.map((item, i) => {
        const start = cumulative;
        cumulative += (item[valueKey] || 0);
        return { ...item, color: colors[i % colors.length], start, end: cumulative };

          {renderGroup('alto', '🟠', 'bg-orange-50 dark:bg-orange-950 border border-orange-200 dark:border-orange-800 text-orange-800 dark:text-orange-300')}
          {renderGroup('medio', '🟡', 'bg-yellow-50 dark:bg-yellow-950 border border-yellow-200 dark:border-yellow-800 text-yellow-800 dark:text-yellow-300')}
          {renderGroup('positivo', '🟢', 'bg-green-50 dark:bg-green-950 border border-green-200 dark:border-green-800 text-green-800 dark:text-green-300')}

          <div className="bg-blue-50 dark:bg-blue-950 border border-blue-200 dark:border-blue-800 rounded-xl p-4">
            <h3 className="font-semibold text-blue-800 dark:text-blue-300 mb-3">Plano de Ação Prioritário</h3>
            <div className="space-y-2">
              {[
                { num: 1, acao: "Renegociar contrato Webi (success fee)", impacto: "Economia R$ 5-6K/mês" },
                { num: 2, acao: "Refinanciar dívidas (SIEMP + Cartão)", impacto: "Reduzir R$ 8K → R$ 3K/mês" },
                { num: 3, acao: "Campanha reativação base 49K", impacto: "Recuperar 10% = R$ 20K receita" },
                { num: 4, acao: "Prospecção 10 farmácias B2B", impacto: "Adicionar R$ 25K/mês" }
              ].map((item, i) => (
                <div key={i} className="flex items-center gap-3 bg-white dark:bg-gray-800 rounded-lg p-3">
                  <span className="w-6 h-6 rounded-full bg-blue-500 text-white text-sm flex items-center justify-center font-medium flex-shrink-0">{item.num}</span>
                  <div className="flex-1">
                    <p className="text-sm text-gray-800 dark:text-gray-200">{item.acao}</p>
                    <p className="text-xs text-blue-600 dark:text-blue-400">{item.impacto}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const ProdutosSection = () => {
      return (
        <div className="space-y-6">
          <div>
            <h2 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Top 10 Produtos por Receita</h2>
            <SectionCard>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="border-b border-gray-200 dark:border-gray-700">
                      <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400">#</th>
                      <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400">SKU</th>
                      <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400">Produto</th>
                      <th className="px-3 py-2 text-left text-xs font-medium text-gray-500 dark:text-gray-400">Categoria</th>
                      <th className="px-3 py-2 text-right text-xs font-medium text-gray-500 dark:text-gray-400">Qtd</th>
                      <th className="px-3 py-2 text-right text-xs font-medium text-gray-500 dark:text-gray-400">Receita</th>
                      <th className="px-3 py-2 text-right text-xs font-medium text-gray-500 dark:text-gray-400">Markup</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100 dark:divide-gray-700">
                    {DADOS.topProdutos.map((p, i) => (
                      <tr key={i} className="hover:bg-gray-50 dark:hover:bg-gray-750">
                        <td className="px-3 py-2 text-gray-400 font-mono text-sm">{i + 1}</td>
                        <td className="px-3 py-2 font-mono text-sm text-gray-600 dark:text-gray-400">{p.sku}</td>
                        <td className="px-3 py-2 text-gray-800 dark:text-gray-200 text-sm">{p.nome}</td>
                        <td className="px-3 py-2 text-xs"><span className="px-2 py-0.5 rounded bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300">{p.categoria}</span></td>
                        <td className="px-3 py-2 text-right text-gray-600 dark:text-gray-400">{p.qtd}</td>
                        <td className="px-3 py-2 text-right font-medium text-green-600 dark:text-green-400">{formatCurrency(p.receita)}</td>
                        <td className="px-3 py-2 text-right">
                          <span className={`px-2 py-0.5 rounded text-xs font-medium ${p.markup >= 90 ? 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300' : 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300'}`}>{p.markup}%</span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </SectionCard>
          </div>

          {/* Categorias */}
          <div>
            <h2 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Mix de Categorias</h2>
            <SectionCard>
              {(() => {
                const cats = {};
                DADOS.topProdutos.forEach(p => {
                  if (!cats[p.categoria]) cats[p.categoria] = { receita: 0, qtd: 0, count: 0 };
                  cats[p.categoria].receita += p.receita;
                  cats[p.categoria].qtd += p.qtd;
                  cats[p.categoria].count += 1;
                });
                const catArr = Object.entries(cats).sort((a, b) => b[1].receita - a[1].receita);
                const totalRec = catArr.reduce((s, [, v]) => s + v.receita, 0);
                return (
                  <div className="grid md:grid-cols-2 gap-6">
                    <div>
                      {catArr.map(([cat, data], i) => (
                        <ProgressBar key={cat} label={`${cat} (${data.count} SKUs)`} value={data.receita} max={catArr[0][1].receita} color={i === 0 ? 'green' : i === 1 ? 'blue' : 'orange'} detail={`${formatCurrency(data.receita)} (${(data.receita / totalRec * 100).toFixed(0)}%)`} showPercent={false} />
                      ))}
                    </div>
                    <div className="flex items-center justify-center">
                      <PieChart
                        data={catArr.map(([cat, data]) => ({ canal: cat, percent: (data.receita / totalRec * 100) }))}
                        size={130}
                      />
                    </div>
                  </div>
                );
              })()}
            </SectionCard>
          </div>

          {/* Regiões */}
          <div>
            <h2 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Vendas por Estado</h2>
            <SectionCard>
              <div className="grid md:grid-cols-2 gap-6">
                <div>
                  {DADOS.regioes.map((r, i) => (
                    <ProgressBar key={r.uf} label={r.uf} value={r.receita} max={DADOS.regioes[0].receita} color={i === 0 ? 'green' : i < 3 ? 'blue' : 'orange'} detail={`${r.pedidos} ped. &bull; ${formatCurrency(r.receita)}`} showPercent={false} />
                  ))}
                </div>
                <div className="flex items-center justify-center">
                  <PieChart
                    data={DADOS.regioes.slice(0, 6).map(r => ({ canal: r.uf, percent: r.percent }))}
                    size={130}
                    labelKey="canal"
                  />
                </div>
              </div>
            </SectionCard>
          </div>
        </div>
      );
    };

    // ==========================================
    // APP PRINCIPAL
    // ==========================================
    const PASSWORD = 'MdO2024@estrategia';

    const App = () => {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [activeSection, setActiveSection] = useState('dashboard');
      const [darkMode, setDarkMode] = useState(false);

      useEffect(() => {
        document.documentElement.classList.toggle('dark', darkMode);
        document.body.className = darkMode ? 'bg-gray-900 transition-colors duration-300' : 'bg-gray-50 transition-colors duration-300';
      }, [darkMode]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (password === PASSWORD) {
          setIsAuthenticated(true);
          setError('');
        } else {
          setError('Senha incorreta');
        }
      };

      const sections = [
        { id: 'dashboard', label: 'Dashboard', icon: '📊' },
        { id: 'fluxo', label: 'Fluxo de Caixa', icon: '💰' },
        { id: 'clientes', label: 'Clientes', icon: '👥' },
        { id: 'b2b', label: 'Canais B2B', icon: '🏢' },
        { id: 'produtos', label: 'Produtos', icon: '📦' },
        { id: 'metas', label: 'Metas 90d', icon: '🎯' },
        { id: 'alertas', label: 'Alertas', icon: '⚠️' }
      ];

      if (!isAuthenticated) {
        return (
          <div className={`min-h-screen flex items-center justify-center p-4 ${darkMode ? 'bg-gray-900' : 'bg-gradient-to-br from-green-50 to-orange-50'}`}>
            <div className={`rounded-2xl shadow-xl p-8 w-full max-w-md ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
              <div className="flex items-center justify-center mb-6">
                <div className="w-16 h-16 rounded-full bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center text-white text-xl font-bold shadow-lg">MdO</div>
              </div>
              <h1 className={`text-2xl font-semibold text-center mb-2 ${darkMode ? 'text-gray-100' : 'text-gray-800'}`}>Mundo dos Óleos</h1>
              <p className={`text-center mb-6 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Painel Estratégico de Consultoria v3</p>
              <form onSubmit={handleLogin}>
                <div className="mb-4">
                  <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Senha de acesso</label>
                  <input type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                    className={`w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-100' : 'border-gray-300'}`}
                    placeholder="Digite a senha" autoFocus />
                </div>
                {error && <p className="text-red-500 text-sm mb-4">{error}</p>}
                <button type="submit" className="w-full bg-green-600 text-white py-3 rounded-lg font-medium hover:bg-green-700 transition shadow-md">Entrar</button>
              </form>
              <div className="flex justify-between items-center mt-6">
                <p className={`text-xs ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>Consultoria 90 dias &bull; Mar/2026</p>
                <button onClick={() => setDarkMode(!darkMode)} className={`text-xs px-3 py-1 rounded-full ${darkMode ? 'bg-gray-700 text-gray-300' : 'bg-gray-100 text-gray-600'}`}>
                  {darkMode ? '☀️ Claro' : '🌙 Escuro'}
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className={`min-h-screen ${darkMode ? 'bg-gray-900' : 'bg-gray-50'}`}>
          {/* Header */}
          <header className={`sticky top-0 z-50 border-b ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
            <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center text-white text-sm font-bold shadow">MdO</div>
                <div>
                  <h1 className={`font-semibold ${darkMode ? 'text-gray-100' : 'text-gray-800'}`}>Mundo dos Óleos</h1>
                  <p className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Painel Estratégico &bull; {DADOS.fluxoCaixa.periodoAtual}</p>
                </div>
              </div>
              <div className="flex items-center gap-2 no-print">
                <span className={`px-3 py-1 rounded-full text-xs font-medium ${DADOS.dre.resultado < 0 ? 'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300' : 'bg-green-100 text-green-700'}`}>
                  {DADOS.dre.resultado < 0 ? 'Déficit' : 'Lucro'}: {formatCurrency(DADOS.dre.resultado)}
                </span>
                <button onClick={() => setDarkMode(!darkMode)} className={`w-8 h-8 rounded-full flex items-center justify-center transition ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-100 hover:bg-gray-200'}`}>
                  {darkMode ? '☀️' : '🌙'}
                </button>
                <button onClick={() => window.print()} className={`w-8 h-8 rounded-full flex items-center justify-center transition ${darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-100 hover:bg-gray-200'}`} title="Exportar / Imprimir">
                  🖨️
                </button>
              </div>
            </div>
            <div className="max-w-7xl mx-auto px-4 pb-3 no-print">
              <div className="flex gap-1 overflow-x-auto scrollbar-hide">
                {sections.map(s => (
                  <button key={s.id} onClick={() => setActiveSection(s.id)}
                    className={`px-3 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap ${
                      activeSection === s.id
                        ? 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300'
                        : `${darkMode ? 'text-gray-400 hover:bg-gray-700' : 'text-gray-600 hover:bg-gray-100'}`
                    }`}
                  >
                    {s.icon} {s.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          {/* Main */}
          <main className="max-w-7xl mx-auto px-4 py-6">
            {activeSection === 'dashboard' && <DashboardSection />}
            {activeSection === 'fluxo' && <FluxoCaixaSection />}
            {activeSection === 'clientes' && <AnaliseClientesSection />}
            {activeSection === 'b2b' && <CanaisB2BSection />}
            {activeSection === 'produtos' && <ProdutosSection />}
            {activeSection === 'metas' && <MetasSection />}
            {activeSection === 'alertas' && <AlertasSection />}
          </main>

          {/* Footer */}
          <footer className={`border-t py-4 mt-8 ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
            <div className={`max-w-7xl mx-auto px-4 text-center text-xs ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
              Consultoria Estratégica 90 dias &bull; v3.0 &bull; Dados: 21/03/2026 &bull; {DADOS.empresa.nomeFantasia}
            </div>
          </footer>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
